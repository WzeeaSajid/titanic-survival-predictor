<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titanic Survival Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Jost:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deep: #1A3A5C;
    --navy-mid: #2A5070;
    --navy-line: #2A425E;
    --ivory: #F5F1E6;
    --ivory-dim: #E7E0CC;
    --brass: #BA7517;
    --brass-light: #D99B2B;
    --brass-dark: #6E4A10;
    --teal: #1D9E75;
    --teal-dark: #0F6E56;
    --coral: #D85A30;
    --coral-dark: #993C1D;
    --water: #2E7FC1;
    --control-h: clamp(38px, 3.5vw, 46px);
    --survive-color: #4FD1A5;
    --perish-color: #F0997B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--navy-deep);
    color: var(--ivory);
    font-family: 'Jost', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(8px, 2vw, 20px);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(255,255,255,0.025), transparent 45%);
  }

  .page {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: clamp(12px, 2vw, 24px);
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(24px, 4vw, 40px);
    letter-spacing: 0.01em;
    color: var(--ivory);
    margin-top: 8px;
  }

  .route {
    font-family: 'Space Mono', monospace;
    font-size: clamp(10px, 0.85vw, 11px);
    color: rgba(245,241,230,0.65);
    text-align: right;
    line-height: 1.7;
    letter-spacing: 0.02em;
  }

  .ticket {
    width: 100%;
    background: var(--ivory);
    color: var(--navy-deep);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .ticket.loaded { opacity: 1; transform: translateY(0); }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--brass-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 40px auto;
  }

  .fields {
    padding: clamp(20px, 3vw, 36px);
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 2vw, 22px);
  }

  .field-label {
    font-size: clamp(12px, 1.1vw, 14px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--navy-mid);
    display: block;
    margin-bottom: 10px;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px, 2vw, 24px); }

  .segmented { display: flex; gap: 8px; }

  .segmented button {
    flex: 1;
    height: var(--control-h);
    padding: 0 8px;
    font-family: 'Jost', sans-serif;
    font-size: clamp(14px, 1.2vw, 16px);
    font-weight: 500;
    border-radius: 10px;
    border: 1.5px solid var(--navy-line);
    background: transparent;
    color: var(--navy-deep);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .segmented button:hover {
    border-color: var(--brass);
    background: rgba(186,117,23,0.06);
  }

  .segmented button.active {
    border-color: var(--brass);
    background: var(--brass);
    color: var(--ivory);
  }

  select, input[type="number"] {
    width: 100%;
    height: var(--control-h);
    padding: 0 14px;
    font-family: 'Jost', sans-serif;
    font-size: clamp(14px, 1.2vw, 16px);
    border-radius: 10px;
    border: 1.5px solid var(--navy-line);
    background: #fff;
    color: var(--navy-deep);
  }

  .slider-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .slider-out { font-family: 'Space Mono', monospace; font-size: clamp(14px, 1.2vw, 16px); font-weight: 700; }

  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 5px;
    border-radius: 3px;
    background: var(--navy-line);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--brass);
    border: 3px solid var(--ivory);
    box-shadow: 0 0 0 1px var(--navy-line);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--brass);
    border: 3px solid var(--ivory);
    cursor: pointer;
    border: none;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(11,31,51,0.75);
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
  }
  .modal-overlay.open {
    display: flex;
  }

  .modal-card {
    background: var(--ivory);
    color: var(--navy-deep);
    border-radius: 14px;
    padding: clamp(32px, 5vw, 48px) clamp(24px, 4vw, 44px);
    max-width: 480px;
    width: 100%;
    position: relative;
    text-align: center;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.5);
  }

  .modal-close {
    position: absolute;
    top: 12px; right: 16px;
    background: none;
    border: none;
    font-size: 28px;
    color: var(--navy-mid);
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .modal-close:hover { opacity: 1; }

  .modal-pct {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: clamp(40px, 6vw, 56px);
    line-height: 1;
    margin-bottom: 8px;
  }

  .modal-verdict {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 2.5vw, 28px);
    margin-bottom: 24px;
  }

  .modal-info {
    font-size: clamp(13px, 1.1vw, 15px);
    color: var(--navy-line);
    line-height: 1.5;
  }

  footer {
    width: 100%;
    margin-top: clamp(18px, 2.5vw, 28px);
    padding-top: 14px;
    border-top: 1px solid rgba(245,241,230,0.14);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .footer-note {
    font-family: 'Jost', sans-serif;
    font-size: clamp(11px, 0.9vw, 12px);
    color: rgba(245,241,230,0.65);
  }

  .footer-mark {
    font-family: 'Cinzel', serif;
    font-size: clamp(10px, 0.85vw, 11px);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,241,230,0.65);
  }

  @media (max-width: 760px) {
    header { flex-direction: column; align-items: flex-start; }
    .route { text-align: left; }
  }

  .error-msg {
    color: var(--coral);
    font-size: clamp(11px, 1vw, 13px);
    margin-top: 10px;
  }

  .predict-btn {
    width: 100%;
    height: var(--control-h);
    font-family: 'Jost', sans-serif;
    font-size: clamp(14px, 1.2vw, 16px);
    font-weight: 600;
    border-radius: 10px;
    border: none;
    background: var(--brass);
    color: var(--ivory);
    cursor: pointer;
    transition: background 0.15s ease;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .predict-btn:hover {
    background: var(--brass-light);
  }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr; }
    .fields { padding: 16px; }
    .segmented button, select, input[type="number"] { height: 48px; }
    input[type="range"]::-webkit-slider-thumb { width: 28px; height: 28px; }
    input[type="range"]::-moz-range-thumb { width: 28px; height: 28px; }
  }

  @media (max-width: 400px) {
    footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <h1>Survival manifest</h1>
    </div>
    <div class="route">
      Southampton &rarr; New York<br>
      Apr 10, 1912 &middot; No. 000914
    </div>
  </header>

  <div class="ticket">
    <div class="fields">

      <div>
        <span class="field-label">Cabin class</span>
        <div class="segmented" id="classGroup">
          <button data-val="1">First</button>
          <button data-val="2">Second</button>
          <button data-val="3" class="active">Third</button>
        </div>
      </div>

      <div class="row2">
        <div>
          <span class="field-label">Sex</span>
          <div class="segmented" id="sexGroup">
            <button data-val="male" class="active">Male</button>
            <button data-val="female">Female</button>
          </div>
        </div>
        <div>
          <span class="field-label">Embarked</span>
          <select id="embarked">
            <option value="S" selected>Southampton</option>
            <option value="C">Cherbourg</option>
            <option value="Q">Queenstown</option>
          </select>
        </div>
      </div>

      <div>
        <div class="slider-row">
          <span class="field-label" style="margin-bottom:0;">Age</span>
          <span class="slider-out" id="ageOut">30</span>
        </div>
        <input type="range" id="age" min="0" max="80" value="30" step="1">
      </div>

      <div>
        <div class="slider-row">
          <span class="field-label" style="margin-bottom:0;">Fare</span>
          <span class="slider-out" id="fareOut">&pound;30</span>
        </div>
        <input type="range" id="fare" min="0" max="500" value="30" step="5">
      </div>

      <div class="row2">
        <div>
          <span class="field-label">Siblings / spouses</span>
          <input type="number" id="sibsp" min="0" max="8" value="0">
        </div>
        <div>
          <span class="field-label">Parents / children</span>
          <input type="number" id="parch" min="0" max="6" value="0">
        </div>
      </div>

      <button class="predict-btn" id="predictBtn">Predict survival</button>

    </div>


  </div>

  <footer>
    <span class="footer-note">Prediction from a Random Forest model trained on Kaggle Titanic data</span>
    <span class="footer-mark">RMS Titanic Predictor</span>
  </footer>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    <div class="modal-pct" id="modalPct">50%</div>
    <div class="modal-verdict" id="modalVerdict">Awaiting input</div>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
const state = { pclass: 3, sex: 'male', age: 30, fare: 30, sibsp: 0, parch: 0, embarked: 'S' };
const TRAINING_SIZE = 891;

let pendingReq = 0;

function styleGroup(groupId, val){
  document.querySelectorAll('#' + groupId + ' button').forEach(b => {
    b.classList.toggle('active', b.dataset.val === String(val));
  });
}

document.querySelectorAll('#classGroup button').forEach(b => b.addEventListener('click', () => { state.pclass = Number(b.dataset.val); styleGroup('classGroup', state.pclass); }));
document.querySelectorAll('#sexGroup button').forEach(b => b.addEventListener('click', () => { state.sex = b.dataset.val; styleGroup('sexGroup', state.sex); }));

document.getElementById('age').addEventListener('input', e => { state.age = Number(e.target.value); document.getElementById('ageOut').textContent = state.age; });
document.getElementById('fare').addEventListener('input', e => { state.fare = Number(e.target.value); document.getElementById('fareOut').textContent = '\u00a3' + state.fare; });
document.getElementById('embarked').addEventListener('change', e => { state.embarked = e.target.value; });
document.getElementById('sibsp').addEventListener('input', e => { state.sibsp = Number(e.target.value) || 0; });
document.getElementById('parch').addEventListener('input', e => { state.parch = Number(e.target.value) || 0; });

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('predictBtn').addEventListener('click', predict);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('modalClose').addEventListener('click', closeModal);

function showModal(data){
  const pct = Math.round(data.probability * 100);
  const survive = data.survived === 1;
  const color = survive ? 'var(--survive-color)' : 'var(--perish-color)';

  document.getElementById('modalPct').textContent = pct + '%';
  document.getElementById('modalPct').style.color = color;
  document.getElementById('modalVerdict').textContent = data.interpretation;
  document.getElementById('modalVerdict').style.color = color;
  document.getElementById('modalInfo').textContent =
    `Cabin: ${state.pclass === 1 ? '1st' : state.pclass === 2 ? '2nd' : '3rd'} Class  \u00b7  Trained on ${TRAINING_SIZE} passengers`;
  document.getElementById('modalOverlay').classList.add('open');
}

async function predict(){
  const btn = document.getElementById('predictBtn');
  btn.textContent = 'Predicting...';
  btn.disabled = true;

  const reqId = ++pendingReq;

  const res = await fetch('/predict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      pclass: state.pclass,
      sex: state.sex,
      age: state.age,
      fare: state.fare,
      sibsp: state.sibsp,
      parch: state.parch,
      embarked: state.embarked,
    }),
  });

  if (reqId !== pendingReq) { btn.textContent = 'Predict survival'; btn.disabled = false; return; }

  btn.textContent = 'Predict survival';
  btn.disabled = false;

  if (!res.ok) {
    document.getElementById('modalPct').textContent = 'ERR';
    document.getElementById('modalVerdict').textContent = 'Could not reach model';
    document.getElementById('modalInfo').textContent = '';
    document.getElementById('modalOverlay').classList.add('open');
    return;
  }

  const data = await res.json();
  showModal(data);
}

styleGroup('classGroup', state.pclass);
styleGroup('sexGroup', state.sex);

requestAnimationFrame(() => {
  setTimeout(() => document.querySelector('.ticket').classList.add('loaded'), 80);
});
</script>
</body>
</html>
